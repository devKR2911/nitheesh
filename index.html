<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Nitheesh KR - Portfolio</title>

    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/animate.css" />
    <link rel="stylesheet" href="./css/styles.css" />

    <script
      type="application/javascript"
      src="./js/jquery-3.4.1.min.js"
    ></script>
    <script type="application/javascript" src="./js/bootstrap.min.js"></script>
    <script type="application/javascript" src="./js/wow.min.js"></script>
    <script src="./js/script.js"></script>

    <link
      href="http://fonts.googleapis.com/css?family=Merienda+One"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="http://fonts.googleapis.com/css?family=Raleway&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="wrapper">
      <div class="row section-container">
        <div class="col-lg-6 col-sm-12 section-header">
          <h1 data-wow-delay=".25s" class="wow fadeIn">Nitheesh KR</h1>
          <p data-wow-delay=".25s" class="wow fadeIn">
            A passionate MEAN stack
            <span class="strike">developer</span> problem solver with
            <span id="total-experience"></span>
            of industrial experience.
          </p>
        </div>
        <div class="col-lg-6 col-sm-12 section-content">
          <div class="profile-image-container"></div>
        </div>
      </div>
      <div class="row section-container">
        <div class="col-lg-6 col-sm-12 col-xs-12 section-header">
          <h1 class="section-title wow fadeIn" data-wow-delay=".25s">
            Technologies
          </h1>
        </div>
        <div class="col-lg-6 col-sm-12 col-xs-12 section-content">
          <div class="technology-container">
            <div class="technology-item wow fadeIn" data-wow-delay=".25s">
              <img
                src="./assets/technologies/angular.svg"
                alt=""
                onclick="goTo('https://angular.io/')"
                title="Angular"
              />
            </div>
            <div class="technology-item wow fadeIn" data-wow-delay=".25s">
              <img
                src="./assets/technologies/react.svg"
                alt=""
                onclick="goTo('https://reactjs.org')"
                title="React JS"
              />
            </div>
            <div class="technology-item wow fadeIn" data-wow-delay=".25s">
              <img
                src="./assets/technologies/vuejs.png"
                alt=""
                onclick="goTo('http://vuejs.org')"
                title="Vue JS"
              />
            </div>
          </div>
          <div class="technology-container">
            <div class="technology-item wow fadeIn" data-wow-delay=".25s">
              <img
                src="./assets/technologies/nodejs.png"
                alt=""
                onclick="goTo('https://nodejs.org')"
                title="Node JS"
              />
            </div>
            <div class="technology-item wow fadeIn" data-wow-delay=".25s">
              <img
                src="./assets/technologies/bootstrap.png"
                alt=""
                onclick="goTo('https://getbootstrap.com')"
                title="Bootstrap"
              />
            </div>
          </div>
          <div class="technology-container">
            <div class="technology-item wow fadeIn" data-wow-delay=".25s">
              <img
                src="./assets/technologies/sass.svg"
                alt=""
                onclick="goTo('https://sass-lang.com')"
                title="SASS"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row section-container">
        <div class="col-lg-6 col-sm-12 section-header">
          <h1 class="section-title wow fadeIn" data-wow-delay=".25s">
            CONTACT AND PROFILES
          </h1>
        </div>
        <div class="col-lg-6 col-sm-12 section-content">
          <div class="contacts-container row">
            <div
              class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn"
              data-wow-delay=".25s"
              onclick="sendMail()"
            >
              <img src="./assets/social/gmail.svg" alt="" />
              <p>Gmail</p>
            </div>
            <div
              class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn"
              data-wow-delay=".25s"
              onclick="callTo()"
            >
              <img src="./assets/social/phone.svg" alt="" />
              <p>+91 8891197611</p>
            </div>
          </div>
          <div class="contacts-container row">
            <div
              class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn"
              data-wow-delay=".25s"
              onclick="goTo('https://www.linkedin.com/in/nitheesh-kr/')"
            >
              <img src="./assets/social/linkedin.svg" alt="" />
              <p>LinkedIn</p>
            </div>
            <div
              class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn"
              data-wow-delay=".25s"
              onclick="goTo('https://medium.com/@nitheeshkr115')"
            >
              <img src="./assets/social/medium.svg" alt="" />
              <p>Medium</p>
            </div>
          </div>
          <div class="contacts-container row">
            <div
              class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn"
              data-wow-delay=".25s"
              onclick="goTo('https://stackoverflow.com/users/6099327/nitheesh')"
            >
              <img src="./assets/social/stackoverflow.svg" alt="" />
              <p>Stack Overflow</p>
            </div>
            <div
              class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn"
              data-wow-delay=".25s"
              onclick="goTo('https://github.com/devKR2911/')"
            >
              <img src="./assets/social/github.svg" alt="" />
              <p>GitHub</p>
            </div>
          </div>
          <p class="copyright">&copy; 2019 Nitheesh KR</p>

        </div>
      </div>
    </div>
  </body>
</html>
