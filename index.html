<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Nitheesh KR - Portfolio</title>

    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/animate.css" />
    <link rel="stylesheet" href="./css/styles.css" />

    <script type="application/javascript" src="./js/jquery-3.4.1.min.js"></script>
    <script type="application/javascript" src="./js/bootstrap.min.js"></script>
    <script type="application/javascript" src="./js/wow.min.js"></script>
    <script src="./js/script.js"></script>

    <link href='http://fonts.googleapis.com/css?family=Merienda+One' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/css?family=Raleway&display=swap" rel="stylesheet">


</head>

<body>
    <div class="wrapper">
        <div class="row section-container">
            <div class="col-lg-6 col-sm-12 section-header">

            </div>
        </div>
        <div class="row section-container">
            <div class="col-lg-6 col-sm-12 col-xs-12 section-header">
                <h1 class="section-title wow fadeIn" data-wow-delay=".25s">Technologies</h1>
            </div>
            <div class="col-lg-6 col-sm-12 col-xs-12 section-content">
                <div class="technology-container">
                    <div class="technology-item wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/technologies/angular.svg" alt="">
                    </div>
                    <div class="technology-item wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/technologies/react.svg" alt="">
                    </div>
                    <div class="technology-item wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/technologies/vuejs.png" alt="">
                    </div>
                </div>

                    </div>
                    <div class="technology-item wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/technologies/bootstrap.png" alt="">
                    </div>
                </div>
                <div class="technology-container">
                    <div class="technology-item wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/technologies/sass.svg" alt="">
                    </div>
                </div>
            </div>
        </div>

        <div class="row section-container">
            <div class="col-lg-6 col-sm-12 section-header">
                <h1 class="section-title wow fadeIn" data-wow-delay=".25s">CONTACT AND PROFILES</h1>
            </div>
            <div class="col-lg-6 col-sm-12 section-content">
                <div class="contacts-container row">
                    <div class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/social/gmail.svg" alt="">
                        Gmail
                    </div>
                    <div class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/social/phone.svg" alt="">
                        +91 8891197611
                    </div>
                </div>
                <div class="contacts-container row">
                    <div class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/social/linkedin.svg" alt="">
                        LinkedIn
                    </div>
                    <div class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/social/medium.svg" alt="">
                        Medium
                    </div>
                </div>
                <div class="contacts-container row">
                    <div class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/social/stackoverflow.svg" alt="">
                        Stack Overflow
                    </div>
                    <div class="contact-item col-lg-6 col-sm-12 col-xs-12 wow fadeIn" data-wow-delay=".25s">
                        <img src="./assets/social/github.svg" alt="">
                        GitHub
                    </div>
                </div>
            </div>
        </div>
